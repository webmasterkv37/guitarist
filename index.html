<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Лучший репетитор игры на гитаре в Иванове"
    />
    <title>Портфолио гитариста</title>
    <link rel="stylesheet" href="./css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <section class="main-section">
      <div class="container main-section__nav-container">
        <header class="main-section__header">
          <img
            src="./icons/logo.svg"
            alt="логотип школы"
            class="main-section__logo"
          />
        </header>
        <nav class="main-section__nav nav-menu">
          <ul class="nav-menu__list">
            <li class="nav-menu__list-item"><a href="#">Обо мне</a></li>
            <li class="nav-menu__list-item"><a href="#">Занятия</a></li>
            <li class="nav-menu__list-item"><a href="#">Запись</a></li>
          </ul>
        </nav>
      </div>
      <div class="container main-section__content-container">
        <div class="left-wrapper">
          <div class="left-wrapper__rectangle-blue"></div>
          <div class="left-wrapper__rectangle-grey"></div>
          <div class="left-wrapper__rectangle-orange"></div>
          <img
            src="img/gitarist.png"
            alt="гитарист"
            class="left-wrapper__img"
          />
        </div>
        <div class="main-section__first-ring ring"></div>
        <div class="right-wrapper">
          <div class="right-wrapper_icon-box icons">
            <div class="icons__item"><i class="bi bi-wechat"></i></div>
            <div class="icons__item"><i class="bi bi-google"></i></div>
            <div class="icons__item"><i class="bi bi-telegram"></i></div>
            <div class="icons__item"><i class="bi bi-microsoft-teams"></i></div>
          </div>
          <h1 class="right-wrapper__title title">Я Виктор</h1>
          <p class="right-wrapper__text">
            Репетитор игры на гитаре с семилетним опытом преподавания
          </p>
          <div class="right-wrapper__button buttons">
            <button class="buttons__main-btn">Забронировать <br />урок</button>
            <div class="right-wrapper__icon-btn buttons__icon-btn">
              <img src="icons/chat.svg" alt="" />
              <p class="buttons__text">Есть <br />вопросы?</p>
            </div>
          </div>
        </div>
      </div>
      <div class="main-section__second-ring ring-big ring"></div>
    </section>
    <section class="section-courses"></section>
    <section class="section-learning"></section>
    <footer class="footer"></footer>
  </body>
</html>
